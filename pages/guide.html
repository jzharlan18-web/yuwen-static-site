    <section class="page-title">
      <p class="crumb"><a href="../index.html">首页</a> / 学生使用提醒</p>
      <h1>学生使用提醒</h1>
      <p class="lead">网页和 AI 工具可以帮助你学习，但不能替代你的阅读、思考、表达和订正。</p>
    </section>
    <section class="section">
      <div class="lesson-list">
        <div class="lesson-link">
          <strong>先读原文，再看辅助</strong>
          <p>学习课文、诗词和文言文时，先完成自己的初读和批注。</p>
        </div>
        <div class="lesson-link">
          <strong>先独立作答，再核对思路</strong>
          <p>试卷讲评页面用于订正和反思，不用于提前复制答案。</p>
        </div>
        <div class="lesson-link">
          <strong>AI 输出必须核验</strong>
          <p>AI 可能出错，尤其是文学常识、文言解释和材料分析。</p>
        </div>
        <div class="lesson-link">
          <strong>不得上传隐私信息</strong>
          <p>不要上传姓名、班级、成绩、完整答卷照片和家庭信息。</p>
        </div>
      </div>
    </section>
